name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
      CLOUDFLARE_DEV_SITE_URL: ${{ vars.CLOUDFLARE_DEV_SITE_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Resolve deploy settings
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            branch_name="${{ github.head_ref }}"
          else
            branch_name="${{ github.ref_name }}"
          fi

          project_name="${CLOUDFLARE_PAGES_PROJECT_NAME:-exploringai-dev}"
          site_url="${CLOUDFLARE_DEV_SITE_URL:-https://dev.exploringai.org}"
          commit_message="$(git log -1 --pretty=%s)"

          echo "branch_name=${branch_name}" >> "${GITHUB_OUTPUT}"
          echo "project_name=${project_name}" >> "${GITHUB_OUTPUT}"
          echo "site_url=${site_url}" >> "${GITHUB_OUTPUT}"
          echo "commit_message=${commit_message}" >> "${GITHUB_OUTPUT}"

      - name: Install website dependencies
        working-directory: website
        run: npm ci

      - name: Build site for Cloudflare Pages
        working-directory: website
        env:
          SITE_URL: ${{ steps.meta.outputs.site_url }}
          PUBLIC_ALLOW_INDEXING: 'false'
        run: npm run build

      - name: Deploy to Cloudflare Pages via Wrangler
        working-directory: website
        run: >
          npx wrangler pages deploy dist
          --project-name "${{ steps.meta.outputs.project_name }}"
          --branch "${{ steps.meta.outputs.branch_name }}"
          --commit-hash "${{ github.sha }}"
          --commit-message "${{ steps.meta.outputs.commit_message }}"

      - name: Write deployment summary
        shell: bash
        run: |
          {
            echo "### Cloudflare Pages deploy"
            echo
            echo "- Project: \`${{ steps.meta.outputs.project_name }}\`"
            echo "- Branch: \`${{ steps.meta.outputs.branch_name }}\`"
            echo "- Site URL used at build time: \`${{ steps.meta.outputs.site_url }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
